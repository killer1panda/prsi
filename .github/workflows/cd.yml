name: Doom Index CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: doom-index

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, dashboard, worker, training]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.environment == 'staging' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: staging
      url: https://staging.doom-index.internal
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Deploy to staging cluster
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

          # Update image tags
          sed -i "s|image: .*api:.*|image: ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.ref_name }}|" k8s/staging/api-deployment.yaml
          sed -i "s|image: .*dashboard:.*|image: ${{ env.REGISTRY }}/${{ github.repository }}/dashboard:${{ github.ref_name }}|" k8s/staging/dashboard-deployment.yaml

          kubectl apply -k k8s/staging/
          kubectl rollout status deployment/api -n doom-index-staging --timeout=300s
          kubectl rollout status deployment/dashboard -n doom-index-staging --timeout=300s

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging.doom-index.internal/health || exit 1
          curl -f https://staging.doom-index.internal/ready || exit 1

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: "Staging deployment ${{ job.status }} for ${{ github.ref_name }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://api.doom-index.io
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy to production (canary)
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

          # Canary deployment: 10% traffic
          kubectl apply -k k8s/production/canary/
          kubectl rollout status deployment/api-canary -n doom-index-prod --timeout=300s

      - name: Canary health check
        run: |
          sleep 60
          for i in {1..5}; do
            curl -f https://api.doom-index.io/health || exit 1
            sleep 10
          done

      - name: Promote to full production
        run: |
          export KUBECONFIG=kubeconfig

          # Update stable deployment
          sed -i "s|image: .*api:.*|image: ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.ref_name }}|" k8s/production/api-deployment.yaml
          kubectl apply -k k8s/production/
          kubectl rollout status deployment/api -n doom-index-prod --timeout=600s

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: "Production deployment ${{ job.status }} for ${{ github.ref_name }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  model-release:
    name: Release Model Artifacts
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download trained model
        run: |
          # In practice, this would download from MLflow or similar
          echo "Downloading model artifacts..."

      - name: Create model release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            models/*.onnx
            models/*.pt
            configs/model_config.yaml
          body: |
            ## Model Release ${{ github.ref_name }}

            - DistilBERT fine-tuned on Pushshift Reddit data
            - GraphSAGE trained on Neo4j user interaction graph
            - ONNX runtime optimized for inference

            ### Performance
            - Accuracy: ~91%
            - F1 (high-risk): ~0.87
            - Latency p99: <50ms
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
