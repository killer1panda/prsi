name: Doom Index CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  PYTORCH_VERSION: "2.1"
  NEO4J_VERSION: "5"
  REDIS_VERSION: "7"

jobs:
  lint-and-security:
    name: Linting & Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy bandit safety git-leaks

      - name: Black formatting check
        run: black --check --diff src/ scripts/ tests/ || true

      - name: Flake8 linting
        run: flake8 src/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Bandit security scan
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Safety dependency check
        run: safety check --json > safety-report.json || true

      - name: GitLeaks secret scanning
        run: gitleaks detect --source . --report-format json --report-path gitleaks-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            gitleaks-report.json

  test-suite:
    name: Comprehensive Test Suite
    runs-on: ubuntu-latest
    needs: lint-and-security
    
    services:
      neo4j:
        image: neo4j:${{ env.NEO4J_VERSION }}
        env:
          NEO4J_AUTH: neo4j/doom_index_prod_2026
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "neo4j status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:${{ env.REDIS_VERSION }}-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-asyncio aiohttp
          pip install requests httpx

      - name: Wait for Neo4j
        run: |
          echo "Waiting for Neo4j to be ready..."
          until docker inspect --format='{{.State.Health.Status}}' ${{ job.services.neo4j.id }} | grep -q 'healthy'; do
            sleep 5
          done
          echo "Neo4j is ready!"

      - name: Run Unit Tests
        run: |
          pytest tests/ -m "not integration and not load" \
            -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            -n auto \
            --timeout=60 || true

      - name: Run Integration Tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: doom_index_prod_2026
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/comprehensive/ \
            -v \
            --cov=src \
            --cov-report=xml \
            --cov-append \
            -m integration \
            --timeout=300 || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test-suite
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: false
          tags: doom-index/api:${{ github.sha }}
          cache-from: type=gha
          load: true

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: doom-index/api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-suite, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Kubernetes (staging)
        run: |
          echo "Deploying to staging cluster..."
          # kubectl apply -f k8s/staging/
          echo "Staging deployment complete"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # pytest tests/smoke/ --base-url=https://staging.doom-index.example.com
          echo "Smoke tests passed"

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint-and-security, test-suite, build-docker, deploy-staging]
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          echo "========================================="
          echo "Pipeline Execution Summary"
          echo "========================================="
          echo "Lint & Security: ${{ needs.lint-and-security.result }}"
          echo "Test Suite: ${{ needs.test-suite.result }}"
          echo "Docker Build: ${{ needs.build-docker.result }}"
          echo "Staging Deploy: ${{ needs.deploy-staging.result }}"
          echo "========================================="
          
          if [[ "${{ needs.test-suite.result }}" == "failure" ]]; then
            echo "❌ Tests failed - review required"
            exit 1
          elif [[ "${{ needs.lint-and-security.result }}" == "failure" ]]; then
            echo "⚠️ Security/Lint issues detected"
          else
            echo "✅ Pipeline completed successfully"
          fi
