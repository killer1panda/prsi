name: Doom Index CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  PYTORCH_VERSION: "2.1"

jobs:
  lint-and-security:
    name: Linting & Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy bandit safety

      - name: Black formatting check
        run: black --check --diff src/ scripts/ tests/ || true

      - name: Flake8 linting
        run: flake8 src/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Bandit security scan
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Safety dependency check
        run: safety check --json > safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  test-suite:
    name: Comprehensive Test Suite
    runs-on: ubuntu-latest
    needs: lint-and-security
    strategy:
      matrix:
        test-type: [unit, integration]
      fail-fast: false
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testpassword123
        ports:
          - 7687:7687

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run Unit Tests
        if: matrix.test-type == 'unit'
        run: |
          pytest tests/ -m "not integration" -v --cov=src --cov-report=xml -n auto || true

      - name: Run Integration Tests
        if: matrix.test-type == 'integration'
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword123
        run: |
          pytest tests/comprehensive/ -v --cov=src --cov-report=xml --cov-append -m integration --timeout=300 || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: ${{ matrix.test-type }}
          name: codecov-${{ matrix.test-type }}

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test-suite
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: false
          tags: doom-index/api:${{ github.sha }}
          cache-from: type=gha

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint-and-security, test-suite, build-docker]
    if: always()
    steps:
      - name: Check job status
        run: |
          echo "Pipeline completed"
          echo "Lint: ${{ needs.lint-and-security.result }}"
          echo "Tests: ${{ needs.test-suite.result }}"
          echo "Docker Build: ${{ needs.build-docker.result }}"
