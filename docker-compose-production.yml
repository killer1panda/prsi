version: "3.9"

# =============================================================================
# Doom Index Production Docker Compose
# =============================================================================
# Services:
#   - api: FastAPI inference server (replicas: 3)
#   - dashboard: Streamlit frontend
#   - worker: Background job processor (Celery)
#   - redis: Cache + message broker
#   - neo4j: Graph database
#   - mongodb: Document store
#   - prometheus: Metrics collection
#   - grafana: Metrics visualization
#   - nginx: Reverse proxy + load balancer
# =============================================================================

services:
  # ==========================================================================
  # API Server
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        - CUDA_VERSION=12.2
        - PYTHON_VERSION=3.10
    image: doom-index/api:latest
    container_name: doom-api
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - DOOM_API_URL=http://localhost:8000
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-doompassword}
      - MONGODB_URI=mongodb://mongodb:27017/doom_index
      - MODEL_PATH=/app/models/doom_index.onnx
      - WORKERS=4
      - LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models:ro
      - ./logs/api:/app/logs
    ports:
      - "8000-8002:8000"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - doom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ==========================================================================
  # Streamlit Dashboard
  # ==========================================================================
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    image: doom-index/dashboard:latest
    container_name: doom-dashboard
    environment:
      - DOOM_API_URL=http://nginx:80/api
      - DOOM_API_KEY=${API_KEY:-dev-key}
    ports:
      - "8501:8501"
    depends_on:
      - api
      - nginx
    networks:
      - doom-network
    restart: unless-stopped

  # ==========================================================================
  # Background Worker (Celery)
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    image: doom-index/worker:latest
    container_name: doom-worker
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-doompassword}
      - MONGODB_URI=mongodb://mongodb:27017/doom_index
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    depends_on:
      - redis
      - neo4j
      - mongodb
    networks:
      - doom-network
    restart: unless-stopped
    deploy:
      replicas: 2

  # ==========================================================================
  # Redis (Cache + Broker)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: doom-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - doom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Neo4j (Graph Database)
  # ==========================================================================
  neo4j:
    image: neo4j:5.13-community
    container_name: doom-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-doompassword}
      - NEO4J_PLUGINS=["apoc", "gds"]
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=2G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    networks:
      - doom-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ==========================================================================
  # MongoDB (Document Store)
  # ==========================================================================
  mongodb:
    image: mongo:7.0
    container_name: doom-mongodb
    environment:
      - MONGO_INITDB_DATABASE=doom_index
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - doom-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/doom_index --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ==========================================================================
  # Prometheus (Metrics)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: doom-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - doom-network
    restart: unless-stopped

  # ==========================================================================
  # Grafana (Visualization)
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.1.0
    container_name: doom-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    networks:
      - doom-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # ==========================================================================
  # Nginx (Reverse Proxy + Load Balancer)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: doom-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    networks:
      - doom-network
    restart: unless-stopped

# =============================================================================
# Networks
# =============================================================================
networks:
  doom-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis-data:
  neo4j-data:
  neo4j-logs:
  neo4j-plugins:
  mongodb-data:
  prometheus-data:
  grafana-data:
