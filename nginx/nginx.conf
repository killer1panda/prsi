user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=batch_limit:10m rate=10r/m;

    # Upstream API servers (load balancing)
    upstream api_servers {
        least_conn;
        server api_1:8000 max_fails=3 fail_timeout=30s;
        server api_2:8000 max_fails=3 fail_timeout=30s;
        server api_3:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream dashboard
    upstream dashboard_server {
        server dashboard:8501;
        keepalive 16;
    }

    # ===================================================================
    # API Server Block
    # ===================================================================
    server {
        listen 80;
        server_name api.doom-index.local;

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /predict/batch {
            limit_req zone=batch_limit burst=5 nodelay;
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        location /metrics {
            # Restrict metrics endpoint
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
            proxy_pass http://api_servers;
        }
    }

    # ===================================================================
    # Dashboard Server Block
    # ===================================================================
    server {
        listen 80;
        server_name dashboard.doom-index.local;

        location / {
            proxy_pass http://dashboard_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            proxy_read_timeout 86400;
        }

        location /_stcore/health {
            proxy_pass http://dashboard_server/_stcore/health;
            access_log off;
        }
    }

    # ===================================================================
    # Prometheus metrics proxy
    # ===================================================================
    server {
        listen 80;
        server_name metrics.doom-index.local;

        location / {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
            proxy_pass http://prometheus:9090;
        }
    }
}
